[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    slow: tests that take > 10 seconds
    integration: tests that need the full system
    l0: L0 自主执行测试
    l1: L1 信息求助测试
    l2: L2 方向求助测试
    l3: L3 升级介入测试
